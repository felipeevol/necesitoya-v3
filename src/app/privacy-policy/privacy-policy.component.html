<div class="page-shell">
  <section class="hero policy-hero">
    <div class="container">
      <h1>{{ currentPolicy.title }}</h1>
      <p>{{ currentPolicy.subtitle }}</p>
    </div>
  </section>

  <main class="privacy-main">
    <div class="container">
      <article class="privacy-card">
        <div class="policy-meta">
          <a class="back-home-link" routerLink="/">{{ currentPolicy.backToHome }}</a>
          <p class="updated-at">
            <strong>{{ currentPolicy.updatedAtLabel }}:</strong>
            {{ currentPolicy.updatedAtValue }}
          </p>
        </div>

        <section class="policy-section" *ngFor="let section of currentPolicy.sections">
          <h2>{{ section.title }}</h2>

          <p *ngFor="let paragraph of section.paragraphs">{{ paragraph }}</p>

          <ul class="policy-list" *ngIf="section.items?.length">
            <li class="policy-list-item" *ngFor="let item of section.items">{{ item }}</li>
          </ul>

          <p *ngIf="section.emailLabel">
            <strong>{{ section.emailLabel }}: </strong>
            <a href="mailto:felipe@profesionaljava.es">felipe&#64;profesionaljava.es</a>
          </p>
        </section>
      </article>
    </div>
  </main>
</div>
