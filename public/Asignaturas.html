        // 1. Reset ALL elements to their default visual state first
        resetAllStyles();

        // 2. Apply highlight to the TAPPED NODE (BLUE BORDER)
        tappedNode.style("border-color", "#0000FF");
        tappedNode.style("border-width", "4px");
        tappedNode.style("background-color", "#FFFACD");
        tappedNode.style("color", "#000");

        // 3. Highlight only the CONNECTED EDGES of the tapped node in blue
        tappedNode.connectedEdges().forEach(function (edge) {
          edge.style("line-color", "#0000FF");
          edge.style("target-arrow-color", "#0000FF");
          edge.style("source-arrow-color", "#0000FF");
          edge.style("width", 4);
          if (tappedNode !== edge.source()) {
            edge.source().style("background-color", "#98D7C2");
            edge.source().style("color", "#000");
            edge.source().style("border-color", "#0000FF");
            edge.source().style("border-width", "4px");
          }

            edge.target().style("color", "#000");
            edge.target().style("border-color", "#0000FF");
            edge.target().style("border-width", "4px");
          }
          if (tappedNode !== edge.source()) {
            edge.target().style("border-color", "#0000FF");
            edge.target().style("border-width", "4px");
          }
        });

        const now = new Date().getTime();
        const timeDiff = now - lastClickTime;
        lastClickTime = now;

        if (timeDiff < 300) {

            console.log("Abrindo link: " + link);
            window.open(link, "_blank"); // Abre em uma nova aba
          }

        // Other nodes remain in their default state
      });
