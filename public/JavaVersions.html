      // Tooltip events
      cy.on("mouseover", "node", function (evt) {
        var node = evt.target;
        var nodeDescription = node.data("description") || node.data("name"); // Usa a descrição ou o nome
        tooltipDiv.innerHTML = nodeDescription;
        tooltipDiv.style.display = "block";
        // Posiciona o tooltip perto do mouse
        // Adiciona um pequeno deslocamento para não cobrir o cursor
        tooltipDiv.style.left = (evt.originalEvent.pageX + 15) + "px";
        tooltipDiv.style.top = (evt.originalEvent.pageY + 15) + "px";
        console.log("Mouseover no nó: " + node.id() + ", Tooltip: " + nodeDescription);
      });

      cy.on("mouseout", "node", function (evt) {
        tooltipDiv.style.display = "none";
        console.log("Mouseout no nó: " + evt.target.id());
      });

      let lastClickTime = 0;

      cy.on("tap", "node", function (evt) {
        var tappedNode = evt.target;
        console.log("Nó clicado (v9):", tappedNode.id());

        const now = new Date().getTime();
        const timeDiff = now - lastClickTime;
        lastClickTime = now;

        if (timeDiff < 300) {

          // Agora, abre o link se existir
          var link = tappedNode.data("linkURL");
          if (link) {
            console.log("Abrindo link: " + link);
            window.open(link, "_blank"); // Abre em uma nova aba
          }

        }

        // Other nodes remain in their default state
      });

      cy.on("cxttap", "node", function (evt) {
        var tappedNode = evt.target;
        var link = tappedNode.data("rightLinkURL");
        if (link) {
          console.log("Abrindo link: " + link);
          window.open(link, "_blank"); // Abre em uma nova aba
        }
      });

      cy.on("tap", function (evt) {
        if (evt.target === cy) {
          resetAllStyles();
        }
      });
